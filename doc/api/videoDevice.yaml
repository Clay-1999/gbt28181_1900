                  type: integer
                  format: int32
                  example: 2
                  description: |-
                    星期几：
                    0：每天
                    1：周一
                    2：周二
                    3：周三
                    4：周四
                    5：周五
                    6：周六
                    7：周日
                  minimum: 0
                  maximum: 7
                timeInfoNum:
                  type: integer
                  format: int32
                  example: 2
                  description: 时间段数量
                timeSpanInfo:
                  items:
                    properties:
                      endTime:
                        type: string
                        example: 120000
                        description: 巡航计划结束时间，格式为HHmmss
                        minLength: 6
                        maxLength: 6
                        pattern: ^(0[0-9]|1[0-9]|2[0-3])(0[0-9]|[1-5][0-9])(0[0-9]|[1-5][0-9])$
                      startTime:
                        type: string
                        example: 16384
                        description: |-
                          巡航计划开始时间，格式为HHmmss
                          结束时间一定要大于开始时间
                        pattern: ^(0[0-9]|1[0-9]|2[0-3])(0[0-9]|[1-5][0-9])(0[0-9]|[1-5][0-9])$
                        minLength: 6
                        maxLength: 6
                      trackInfo:
                        properties:
                          trackIndex:
                            type: string
                            example: 1
                            description: 轨迹索引
                          trackType:
                            type: string
                            example: 1
                            description: |-
                              巡航类型

                              1：路线巡航
                              2：模式巡航
                              3：水平巡航
                              4：垂直巡航
                              目前只支持类型1 路线巡航
                        required:
                          - trackIndex
                          - trackType
                        description: 轨迹对象
                    required:
                      - endTime
                      - startTime
                      - trackInfo
                  type: array
                  description: 巡航计划时间数据
              required:
                - dayType
                - timeInfoNum
                - timeSpanInfo
            type: array
            description: 巡航计划信息数据
          planType:
            type: integer
            format: int32
            example: 0
            description: 路线索引
        required:
          - cameraCode
          - isEnable
          - planList
          - planType
        description: 巡航计划对象
      resultCode:
        type: integer
        format: int32
        example: 0
        description: 错误码
    required:
      - cruisePlanInfo
      - resultCode
  SetCruisePlanReq:
    type: object
    required:
      - cameraCode
      - isEnable
      - planType
      - planInfoList
    properties:
      domainCode:
        type: string
        example: 3743c144905b32abed11d117bbbbe489
        description: NVR域编码，小写字母+数字组成，32字节
      cameraCode:
        type: string
        example: '08721893516000010101'
        description: 镜头子设备编码，纯数字组成，以0101结尾，20字节
        pattern: ^[0-9]{20}$
        minLength: 20
        maxLength: 20
      isEnable:
        type: integer
        format: int32
        example: 1
        description: |-
          是否启用计划：
          0：停用
          1：启用
        minimum: 0
        maximum: 1
      planType:
        type: integer
        format: int32
        example: 0
        description: |-
          计划方式：
          0：周计划(WEEK)
          1：日计划(DAY)，周一到周日计划相同
        minimum: 0
        maximum: 1
      planInfoList:
        description: 计划信息列表对象
        required:
