        example: 3743c144905b32abed11d117bbbbe489
        description: NVR域编码，小写字母+数字组成，32字节
        minLength: 32
        maxLength: 32
      cameraCode:
        type: string
        example: 0
        description: 镜头子设备编码，纯数字组成，以0101结尾，20字节
        pattern: ^[0-9]{20}$
        minLength: 20
        maxLength: 20
      cruiseNo:
        type: integer
        format: int32
        example: 1
        description: |-
          巡航路线索引
          目前HWSDK最多支持添加16条巡航路线
        minimum: 1
        maximum: 16
      name:
        type: string
        example: test
        description: 巡航路线名称，必须唯一
        minLength: 1
        maxLength: 32
      cruiseType:
        type: integer
        format: int32
        example: 1
        description: |-
          路线类型：
          1：巡航路线 2：模式路线 3：水平路线 4：垂直路线

          当前HWSDK只支持 巡航路线 1
        minimum: 1
        maximum: 1
