      HSErrorCode:
        type: integer
        format: int32
        description: 错误码
      HSErrorMsg:
        type: string
        description: 错误信息
  capObj:
    type: object
    required:
      - MaxChannelNum
      - SupportTurbo
      - TurboChannelNum
      - ChannelSwap
      - SupportPnp
      - SupportIpAssignment
      - SupportMultiChannel
      - SupportProtocol
      - IsSupportNvrTurboV2
      - MaxChannelNumOnTurboV2
      - SupportBatchActive
      - SupportScanAccess
      - SupportFrontIntelligence
    properties:
      MaxChannelNum:
        type: integer
        format: int32
        example: 8
        description: 普通模式最大视频通道接入数目
      SupportTurbo:
        type: boolean
        example: true
        description: 是否支持turbo
      TurboChannelNum:
        type: integer
        format: int32
        example: 16
        description: turbo模式最大视频通道接入数目
      ChannelSwap:
        type: boolean
        example: true
        description: 是否支持通道交换
      SupportPnp:
        type: boolean
        example: true
        description: 是否支持即插即用
      SupportIpAssignment:
        type: boolean
        example: true
        description: 是否支持摄像机IP接入分配
      SupportMultiChannel:
        type: boolean
        description: 是否支持南向多视频通道设备接入
      SupportProtocol:
        description: 南向支持协议类型
        required:
          - HWSDK
          - ONVIF
          - RTSP
        properties:
          HWSDK:
            type: boolean
            example: true
            description: hwsdk协议接入
          ONVIF:
            type: boolean
            example: true
            description: onvif协议接入
          RTSP:
            type: boolean
            example: true
            description: rtsp协议接入
      IsSupportNvrTurboV2:
        type: boolean
        description: turbo是否支持接入非HWSDK协议相机
      MaxChannelNumOnTurboV2:
        type: integer
        format: int32
        description: 存在非HWSDK协议相机时，最大通道接入数目
      SupportBatchActive:
        type: boolean
        description: 13.1版本新增，存在且为true时支持批量激活相机
      SupportScanAccess:
        type: boolean
        description: 13.1版本新增，是否支持扫码接入
      SupportFrontIntelligence:
        type: boolean
        description: 13.1版本新增，开启turbo时是否支持前端智能
