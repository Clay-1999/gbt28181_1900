          schema:
            type: object
            properties:
              DeviceList:
                type: array
                items:
                  properties:
                    DevNewPWD:
                      type: string
                      example: ''
                      description: 设备登录新密码
                    ProtocolType:
                      type: string
                      example: MultiCast_New
                      description: |-
                        协议
                        BroadCast：二层广播（默认）
                        MultiCast：组播（组播地址为239.100.100.100）
                        MultiCast_New:新组播（组播地址为239.255.255.250，在小全光组网下只有新组播才能穿透）
                        此字段需要结合 /HSAPI/V1/Devices/SearchResult rest接口中返回的 DevSearchProtocol 搜索协议字段来填写：
                        DevSearchProtocol为1，表示 BroadCast；
                        DevSearchProtocol为2，表示 MultiCast；
                        DevSearchProtocol为3，表示 MultiCast_New；
                    DevIdentify:
                      type: string
                      example: 08:5C:1B:14:FC:BD
                      description: |-
                        设备标识符
                        protocol为BroadCast时，设置为IP地址
                        protocol为MultiCast、MultiCast_New时，设置为Mac地址
                    SerialNumber:
                      type: string
                      example: 21024142299SQ8000095
                      description: |-
                        设备序列号
                        当protocol为MultiCast 或者MultiCast_New时必选
                  required:
                    - DevNewPWD
                    - ProtocolType
                    - DevIdentify
                description: 设备信息列表
              DeviceNum:
                type: integer
                format: int32
                example: 1
                description: 设备数
              UsingDefaultUser:
                type: integer
                format: int32
                example: 1
                description: 表示是否使用默认用户名、密码，默认为 0。此字段必须在配置 了默认用户名、密码（PUT /HSAPI/V1/Devices/DefaultUserInfo)之后才能使能。此字段为1时，则忽略上面输入的devUserName、devOldPWD、devNewPWD字段。
