  /device/setdeviceconfig:
    post:
      x-api-distribute: limited
      x-api-domain: Platform
      x-api-scope: 1800
      tags:
        - 摄像机参数配置
      summary: 配置摄像机参数
      description: |-
        通过 configType 区分配置类型：
        1：主设备基本参数 DeviceConfig（接入参数）
        4：摄像机基本参数设置 CameraConfig
        5：摄像机码流参数设置 CameraStreamConfig
        6：摄像机基本显示参数设置 CameraDisplayConfig
        8：摄像机OSD参数设置 CameraOSDConfig
        9：摄像机移动侦测参数设置 MotionDetection
        10：摄像机遮挡告警参数设置 VideoHideAlarm
        11：摄像机隐私保护参数设置 VideoMask
        12：摄像机音频参数设置 AudioConfig
        14：告警输入子设备设置 AlarmInConfig
        15：告警输出子设备设置 AlarmOutConfig
        17：摄像机扩展参数设置 CameraExtendConfig
        18：主设备告警参数设置 DeviceAlarmConfig（SDC告警联动总开关）
        时间参数：配置摄像机主设备的时间参数
      operationId: setdeviceconfig
      parameters:
        - name: reqBody
          in: body
          required: true
          description: 请求报文
          schema:
            $ref: '#/definitions/setDeviceConfigReq'
      responses:
        '200':
