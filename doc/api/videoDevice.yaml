        properties:
          planInfo:
            items:
              required:
                - dayType
                - timeInfoList
              properties:
                dayType:
                  type: integer
                  format: int32
                  example: 2
                  description: |-
                    星期几：
                    1：周一
                    2：周二
                    3：周三
                    4：周四
                    5：周五
                    6：周六
                    7：周日
                  minimum: 1
                  maximum: 7
                timeInfoList:
                  description: 巡航计划时间对象
                  required:
                    - timeInfo
                  properties:
                    timeInfo:
                      items:
                        required:
                          - startTime
                          - endTime
                          - cruiseType
                          - cruiseNo
                        properties:
                          startTime:
                            type: string
                            example: 16384
                            description: 巡航计划开始时间，格式为HHmmss
                          endTime:
                            type: string
                            example: 120000
                            description: 巡航计划结束时间，格式为HHmmss
                          cruiseType:
                            type: integer
                            format: int32
                            example: 1
                            description: |-
                              巡航类型
                              1：路线巡航
                              2：模式巡航
                              3：水平巡航
                              4：垂直巡航
                              目前只支持路线巡航 1
                            minimum: 1
                            maximum: 1
                          cruiseNo:
                            type: integer
                            format: int32
                            example: 1
                            description: 路线索引
                      type: array
                      description: 时间信息列表
            description: 巡航计划信息数据
            type: array
