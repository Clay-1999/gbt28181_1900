      AlarmInChanIndex:
        type: integer
        format: int32
        description: 告警输入通道索引，仅查询时使用，设置时无效且不做校验
      SwitchType:
        type: integer
        format: int32
        description: 设备开关类型，0:关 1:开
      AutoClearAlarmTime:
