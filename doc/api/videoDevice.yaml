    properties:
      ChannelId:
        type: integer
        format: int32
        description: 通道号，为0时表示自动分配，否则表示期望添加相机至指定通道上
      DeviceName:
        type: string
        description: 相机名称
      ProtocolType:
        type: integer
        format: int32
        description: 协议类型，1：HWSDK，2：ONVIF，12：RTSP
      IpAddress:
        type: string
        description: IP地址
      Port:
        type: integer
        format: int32
        description: 端口号
      UserName:
        type: string
        description: 用户名
      Password:
        type: string
        description: 密码，调用校验接口时不会返回
      HttpType:
        type: integer
        format: int32
        description: http类型，ONVIF协议接入时使用，0：HTTP，1：HTTPS，2：HTTP/HTTPS
      RtspPort:
        type: integer
        format: int32
        description: rtsp端口，RTSP协议接入时使用
      ConnectCode:
        type: string
        description: 设备互联编码，HWSDK协议主动注册接入时使用
      RtspMainUri:
        type: string
        description: rtsp主码流资源路径，RTSP协议接入时使用
      RtspSubUri:
        type: string
        description: rtsp辅码流资源路径，RTSP协议接入时使用
      DeviceCode:
        type: string
        description: 主设备编码，以0000结尾，导入时该字段不生效
