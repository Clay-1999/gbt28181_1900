definitions:
  setDeviceConfigReq:
    description: 配置摄像机参数请求报文
    required:
      - configType
    properties:
      deviceCode:
        type: string
        description: 设备编码
      configType:
        type: integer
        format: int32
        description: |-
          配置类型：
          1：主设备基本参数 DeviceConfig
          4：摄像机基本参数设置 CameraConfig
          5：摄像机码流参数设置 CameraStreamConfig
          6：摄像机基本显示参数设置 CameraDisplayConfig
          8：摄像机OSD参数设置 CameraOSDConfig
          9：摄像机移动侦测参数设置 MotionDetection
          10：摄像机遮挡告警参数设置 VideoHideAlarm
          11：摄像机隐私保护参数设置 VideoMask
          12：摄像机音频参数设置 AudioConfig
          14：告警输入子设备设置 AlarmInConfig
          15：告警输出子设备设置 AlarmOutConfig
          17：摄像机扩展参数设置 CameraExtendConfig
          18：主设备告警参数设置 DeviceAlarmConfig
      configItem:
        type: object
        description: |-
          配置内容，根据 configType 对应不同的参数结构：
          1  → $ref: '#/definitions/setMainDevReq' 中的 configItem（cameraDeviceConfig）
          4  → 摄像机基本参数 CameraConfig
          5  → $ref: '#/definitions/streamSetReq' 中的 configItem（cameraStreamConfig）
          6  → $ref: '#/definitions/setDisplayReq' 中的 configItem（cameraDisplayConfig）
          8  → $ref: '#/definitions/setOsdRsp' 中的 configItem（cameraOSDConfig）
          9  → $ref: '#/definitions/setdeviceconfig9Req' 中的 configItem（motionDetection）
          10 → $ref: '#/definitions/hideAlarmReq' 中的 configItem（videoHideAlarm）
          11 → $ref: '#/definitions/setVidioMaskReq' 中的 configItem（videoMask）
          12 → $ref: '#/definitions/setAlarmOutReq' 中的 configItem（audioConfig）
          14 → $ref: '#/definitions/setAlarmOutReq' 中的 configItem（alarmInConfig）
          15 → $ref: '#/definitions/setAlarmOutReq' 中的 configItem（alarmOutConfig）
          17 → $ref: '#/definitions/setExtendReq' 中的 configItem（cameraExtendConfig）
          18 → 主设备告警联动总开关 DeviceAlarmConfig
        x-configType-schemas:
          1:
            $ref: '#/definitions/setMainDevReq'
          5:
            $ref: '#/definitions/streamSetReq'
          6:
            $ref: '#/definitions/setDisplayReq'
          8:
            $ref: '#/definitions/setOsdRsp'
          10:
            $ref: '#/definitions/hideAlarmReq'
          11:
            $ref: '#/definitions/setVidioMaskReq'
          12:
            $ref: '#/definitions/setAlarmOutReq'
          14:
            $ref: '#/definitions/setAlarmOutReq'
          15:
            $ref: '#/definitions/setAlarmOutReq'
          17:
            $ref: '#/definitions/setExtendReq'
  OldResultCode:
    description: 错误码
    required:
      - resultCode
    properties:
      resultCode:
        type: integer
        format: int32
        example: 0
        description: 错误码
    type: object
  ErrorRsp:
    description: 失败时返回的错误对象
    required:
      - error_code
      - error_msg
    properties:
      error_code:
        description: 错误码
        type: string
        minLength: 8
        maxLength: 36
      error_msg:
        description: 错误描述
        type: string
        minLength: 2
        maxLength: 512
  SetRsp:
    type: object
    required:
      - resultCode
    properties:
      resultCode:
        type: integer
        format: int32
        description: 业务返回码，0表示成功，其他表示失败，整形
        example: 0
  startSearchRsp:
    type: object
    required:
      - searchInfo
    properties:
      domainCode:
        type: string
        example: 089d6ae965674667bf7f9e5339f8e76b
        description: 域编码，设备的域编码，由小写字母、数字组成，32字节（当前未使用，不作校验）
      searchInfo:
        type: string
        example: <Content><SearchInfo><ProtocolType>HWSDK</ProtocolType><DevModelType>MPU46</DevModelType><ServerCode>f563c8bc3f8240009637a9edd500ca19</ServerCode><IPList><IPInfo><DevIPFrom>xx.xx.xx.xx</DevIPFrom><DevIPTo>xx.xx.xx.xx</DevIPTo><DevPort></DevPort></IPInfo></IPList></SearchInfo></Content>
        description: 设备搜索信息XML
  startSearchInfo:
    type: object
    properties:
      ProtocolType:
        type: string
        example: HWSDK
        description: 主设备协议类型搜索协议
      IPList:
        items:
          properties:
            DevIPFrom:
              type: string
              example: xx.xx.xx.xx
              description: 启始IP地址
            DevIPTo:
              type: string
              example: xx.xx.xx.xx
              description: 截止IP地址
            DevPort:
              type: integer
              format: int32
              example: 6060
              description: 搜索端口
          required:
            - DevIPFrom
            - DevIPTo
            - DevPort
        type: array
        description: 搜索IP列表
    required:
      - ProtocolType
  verifyRsp:
    type: object
    properties:
      domainCode:
        type: string
        example: 089d6ae965674667bf7f9e5339f8e76b
        description: NVR服务器设备域编码
      verifyInfo:
        type: string
        example: <Content><ValidateInfo><ServerCode>4322119b0bd34114861e3ac662c13277</ServerCode><ProtocolType>HIKSDK</ProtocolType><DevIP>xx.xx.xx.xx</DevIP> <DevPort>8000</DevPort><DevUser>admin</DevUser><DevPWD>XXX</DevPWD></ValidateInfo></Content>
        description: 接入设备验证信息XML序列化字符串
    required:
      - domainCode
      - verifyInfo
  ValidateInfo:
    type: object
    required:
      - verifyInfo
    properties:
      domainCode:
        type: string
        example: 089d6ae965674667bf7f9e5339f8e76b
        description: NVR域编码，不做校验
      verifyInfo:
        type: string
        example: <Content><ValidateInfo><ServerCode>4322119b0bd34114861e3ac662c13277</ServerCode><ProtocolType>HWSDK</ProtocolType><DevIP>xx.xx.xx.xx</DevIP><DevPort>6060</DevPort><DevUser>admin</DevUser><DevPWD>XXX</DevPWD></ValidateInfo></Content>
        description: 设备验证信息XML
    description: "\"<Content>\n  \t\t\t\t\t\t<ValidateInfo>\n                          <ServerCode>4322119b0bd34114861e3ac662c13277</ServerCode> 不做校验\n                          <ProtocolType>HIKSDK</ProtocolType> 主设备协议类型  ONVIF：开放型网络视频接口论坛 HWSDK：HW私有协议 MultiCast：组播方式验证，仅支持HWSDK协议的摄像机\n                          <SubProtocol>0</SubProtocol> 仅ProtocolType为ONVIF时有效 http https\n                 \t\t <DevIP>xx.xx.xx.xx</DevIP>  前端设备IP地址 ONVIF和HWSDK协议时必选\n                          <DevIPType>0</DevIPType>  前端设备IP地址 类型 0 IPv4 1 IPv6\n                          <DevPort>8000</DevPort> ProtocolType为ONVIF和HWSDK时必选\n                          <DevMac>xxxx.xxx.xxx.xx</DevMac> 组播方式验证时必选 摄像机Mac地址\n                          <DevSn>xxxx.xxx.xxx.xx</DevSn> 组播方式验证时必选 摄像机SN\n                          <DevUser>admin</DevUser>\n                          <DevPWD>123456</DevPWD>\n  \t\t\t\t\t</ValidateInfo>\n</Content>\""
  IPDevice_SearchStart_Req:
    type: object
    required:
      - ProtocolType
    properties:
      ProtocolType:
        type: integer
        format: int32
        example: '1'
        description: |-
          IP网段搜索：HWSDK ONVIF
          组播+二层网络搜索，多协议组合搜索：MULTI
          1: ONVIF
          2: HWSDK
          500: MULTI
        enum:
          - 1
          - 2
          - 500
      IPSegments:
        type: string
        example: 192.168.2.1/192.168.2.255;192.138.2.1/192.138.2.255;192.168.4.1/192.168.4.255
        description: |-
          IP搜索段：以分隔符“/”表示一对,"DevIPFrom -> DevIPTo"; 以分隔符";" ，划分下一组。
          多协议搜索时，不需要填写。
          最多支持3组IP段，最大IP搜索数量，根据NVR款项不同接入数量而定，默认最大 256个IP
        maxLength: 95
        minLength: 31
  MultCastSetIpReq:
    type: object
    required:
      - ProtocolType
      - DevMac
      - DevIp
      - DevGateway
      - DevMask
    properties:
      ProtocolType:
        type: string
        description: |-
          修改IP所使用的协议
          BroadCast:二层搜索协议
          MultiCast:组播搜索协议（组播地址为239.100.100.100）
          MultiCast_New:新组播搜索协议（组播地址为239.255.255.250，在小全光组网下只有新组播才能穿透）
          此字段需要结合 /HSAPI/V1/Devices/SearchResult rest接口中返回的 DevSearchProtocol 搜索协议字段来填写：
          DevSearchProtocol为1，表示 BroadCast；
          DevSearchProtocol为2，表示 MultiCast；
          DevSearchProtocol为3，表示 MultiCast_New；
      DevMac:
        type: string
        description: 摄像机MAC地址
      DevSn:
        type: string
        description: 组播搜索、新组播搜索时必选
      DevUser:
        type: string
        description: |-
          组播搜索时必选，仅支持
          admin和apiadmin
      DevDhcp:
        type: integer
        format: int32
        description: |-
          0：不启用DHCP（默认值）
          1：启用DHCP
        enum:
          - 0
          - 1
      DevPwd:
        type: string
        description: |-
          摄像机密码
          对于未激活的设备可以不携
          带此字段
      DevIp:
        type: string
        description: 需要设置的IPV4地址,单独设置必须带，批量设置可以不带，由后端在网段中分配
      DevGateway:
        type: string
        description: 需要设置的IPV4网关
      DevMask:
        type: string
        description: 需要设置的IPV4子网掩码
  BatchSetSdcNetwork:
    type: object
    description: 批量设置前端摄像机的ip信息
    properties:
      DeviceNums:
        type: integer
        description: 待修改ip设备数量
        example: 1
      StartIp:
        type: string
        description: 批量修改ip时，起始地址
      EndIp:
        type: string
        description: 批量修改ip时，结束地址
      UsingDefaultUser:
        type: integer
        description: 是否使用默认密码，1： 使用 0： 不使用，默认不使用，如果没有设置默认密码，选择1时报错
        enum:
          - 0
          - 1
      UsingDefaultIpPool:
        type: integer
        format: int32
        description: 是否使用默认IP池，默认IP池配置了后，可以使用，1： 使用，0： 不使用，使用默认IP池时，忽略用户输入的StartIp、EndIp
      CheckChannelEnough:
        type: integer
        format: int32
        description: 表示该接口是否校验后台通道数是否足够，1： 校验 0： 不校验。此字段为1，则后台校验后台通道数。如果后台剩余通道数小于此接口传入的设备数量，则后台校验报错，提示剩余通道数不足，后台不进行修改ip动作。
        default: 0
      DeviceList:
        type: array
        items:
          $ref: '#/definitions/MultCastSetIpReq'
        description: 列表
    required:
      - DeviceNums
      - StartIp
      - EndIp
