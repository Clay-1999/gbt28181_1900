    properties:
      resultCode:
        type: integer
        description: 错误码
        example: 0
      ptzCurrentInfo:
        description: 摄像机云台位置范围和运动速率范围信息，取值范围取决于相机能力
        required:
          - cameraCode
          - ptzRange
          - position
        properties:
          cameraCode:
            type: string
            description: 摄像机编码
            pattern: ^[0-9a-zA-Z]{20}$
            example: 0123456c20c000020101
          ptzRange:
            description: 摄像机云台位置范围和运动速率范围信息
            required:
              - dXMax
              - dXMin
              - dYMax
              - dYMin
              - dZMax
              - dZMin
              - dVXMax
              - dVXMin
              - dVYMax
              - dVYMin
              - dVZMax
              - dVZMin
            properties:
              dXMax:
                type: number
                description: 摄像机云台水平位置最大值
                example: 360.0
              dXMin:
                type: number
                description: 摄像机云台水平位置最小值
                example: 0.0
              dYMax:
                type: number
                description: 摄像机云台垂直位置最大值
                example: 90.0
              dYMin:
                type: number
                description: 摄像机云台垂直位置最小值
                example: -10.0
              dZMax:
                type: number
                description: 摄像机变倍倍数最大
                example: 240.0
              dZMin:
                type: number
                description: 摄像机变倍倍数最小
                example: 1.0
              dVXMax:
                type: number
                description: 摄像机云台水平速度最大值
                example: 10.0
              dVXMin:
                type: number
                description: 摄像机云台水平速度最小值
                example: 1.0
              dVYMax:
                type: number
                description: 摄像机云台垂直速度最大值
                example: 10.0
              dVYMin:
                type: number
                description: 摄像机云台垂直速度最小值
                example: 1.0
              dVZMax:
                type: number
                description: 摄像机变倍速度最大
                example: 10.0
              dVZMin:
                type: number
                description: 摄像机变倍速度最小
                example: 1.0
          position:
            description: 摄像机云台位置范围和运动速率范围信息
            required:
              - dX
              - dY
              - dZ
            properties:
              dX:
                type: number
                description: 摄像机云台水平位置
                example: 353.200012
              dY:
                type: number
                description: 摄像机云台垂直位置
                example: -17.16
              dZ:
                type: number
                description: 摄像机云台位置信息
                example: 1.31
