    properties:
      ChannelId:
        type: integer
        format: int32
        example: 1
        description: 通道号
      Version:
        type: string
        example: “11.0”
        description: 可升级版本号
      PkgDetailInfoList:
        type: array
        items:
          $ref: '#/definitions/PkgDetailInfo'
        description: 软件包详情列表
      ErrorCode:
        type: integer
        format: int32
        example: 0
        description: 错误码
      ErrorMsg:
        type: string
        example: 成功
        description: 错误信息
      DeviceCode:
        type: string
        example: '08721893516000010101'
        description: 相机编码
    required:
      - ChannelId
      - Version
      - PkgDetailInfoList
      - ErrorCode
      - ErrorMsg
      - DeviceCode
    description: 升级版本查询信息结构体
  GetUpgradeVerRsp:
    type: object
    required:
      - HSErrorMsg
      - HSErrorCode
      - UpgradeDevVerList
    properties:
      HSErrorMsg:
        type: string
        example: '0'
        description: 错误码
      HSErrorCode:
        type: integer
        format: int32
        example: 成功
        description: 错误信息
      UpgradeDevVerList:
        type: array
        items:
          $ref: '#/definitions/UpgradeVerInfo'
        description: 查询相机升级版本信息列表
  UpgradeDetail:
    type: object
    required:
      - FileType
      - FileName
      - FileStatus
      - ResultCode
      - FromVersion
      - ToVersion
    properties:
      FileType:
        type: integer
        format: int32
        description: 文件类型
        example: 1
      FileName:
        type: string
        description: 文件名称
        example: 升级文件
      FileStatus:
        type: integer
        format: int32
        description: |-
          DOWNLOAD_PENDING = 0,
              DOWNLOADING,
              DOWNLOAD_SUCCESS,
              UPGRADING,
              DOWNLOAD_FAIL,
              UPGRADE_FAIL,
              UPGRADE_SUCCESS,
        example: 0
      ResultCode:
        type: integer
        format: int32
        description: 错误码
        example: 0
      FromVersion:
        type: string
        description: 原版本
        example: “11.0”
      ToVersion:
        type: string
        description: 目标版本
        example: “11.0”
    description: 升级文件详情
  Get_IpPool_Response:
    type: object
    properties:
      HSErrorCode:
        type: integer
        format: int32
        example: 0
        description: 错误码，成功为0
      HSErrorMsg:
        type: string
        example: Operation succeeded.
        description: 错误信息
      Enable:
        type: integer
        format: int32
        example: 1
        description: 使能
      StartIndex:
        type: integer
        format: int32
        example: 200
        description: 起始地址
      EndIndex:
        type: integer
        format: int32
        example: 254
        description: 结束地址
    description: 获取ip池响应
  commonRsp:
    type: object
    properties:
      resultCode:
        type: integer
        format: int32
        description: 成功返回0，失败返回错误码
      resultMsg:
        type: string
        description: 错误信息
  osdPosInfo:
    type: object
    required:
      - height
      - width
      - startX
      - startY
    properties:
      height:
        type: integer
        format: int32
        example: 0
        description: 高
      width:
        type: integer
        format: int32
        example: 0
        description: 宽
      startX:
        type: integer
        format: int32
        example: 0
        description: 起始坐标X
      startY:
        type: integer
        format: int32
        example: 0
        description: 起始坐标Y
    description: Osd位置信息
  AddDeviceGroupReq:
    type: object
    required:
      - GroupName
    properties:
      GroupName:
        type: string
        example: group2
        description: 分组名字
        maxLength: 64
        minLength: 1
  AddDeviceGroupRsp:
    type: object
    required:
      - HSErrorCode
      - HSErrorMsg
      - GroupId
    properties:
      HSErrorCode:
        type: integer
        format: int32
        example: 0
        description: 错误码
      HSErrorMsg:
        type: string
        example: Operation succeeded.
        description: 错误信息
      GroupId:
        type: integer
        format: int32
        example: 2
        description: 设备分组id
  getDeviceGroupRsp:
    type: object
    required:
      - HSErrorCode
      - HSErrorMsg
      - ParaList
    properties:
      HSErrorCode:
        type: integer
        format: int32
        example: 0
        description: 错误码
      HSErrorMsg:
        type: string
        example: OK
        description: 错误信息
      ParaList:
        type: array
        items:
          required:
            - GroupName
            - GroupId
          properties:
            GroupName:
              type: string
              example: group2
              description: 设备分组名字
            GroupId:
              type: integer
              format: int32
              example: 2
              description: 设备分组id
        description: 分组详细信息
  GetGroupDeviceInfoRsp:
    type: object
    required:
      - HSErrorCode
      - HSErrorMsg
      - GroupInfoList
    properties:
      HSErrorCode:
        type: integer
        format: int32
        example: 0
        description: 错误码
      HSErrorMsg:
        type: string
        example: Operation succeeded.
        description: 错误信息
      GroupInfoList:
        type: array
        items:
          required:
            - GroupId
            - GroupName
            - GroupDeviceNum
            - GroupDeviceInfo
          properties:
            GroupId:
              type: integer
              format: int32
              example: 0
              description: 分组groupId
            GroupName:
              type: string
              example: Default
              description: 分组名字
            GroupDeviceNum:
              type: integer
              format: int32
              example: 2
              description: 分组内设备个数
            GroupDeviceInfo:
              type: array
              items:
                required:
                  - ChannelId
                  - Ip
                  - Status
                  - ChannelName
                properties:
                  ChannelId:
                    type: integer
                    format: int32
                    example: 1
                    description: 设备通道号
                  CameraCode:
                    type: string
                    description: 通道编码
                  Ip:
                    type: string
                    example: 130.2.15.103
                    description: 设备ip
                  Status:
                    type: integer
                    format: int32
                    example: 1
                    description: 设备在线状态
                  ChannelName:
                    type: string
                    example: 244camera
                    description: 设备通道名称
                  deviceModelType:
                    type: string
                    description: 设备型号
                  parentCode:
                    type: string
                    description: 设备编码
                  protocolType:
                    type: integer
                    format: int32
                    description: 协议类型
                  registerErr:
                    type: string
                    description: 登录错误信息
                  type:
                    type: integer
                    format: int32
                    description: 设备类型
              description: 此分组内设备信息
        description: 分组信息列表
  SetGroupDeviceInfoReq:
    type: object
    required:
      - ChannelIdList
      - DestGroupId
    properties:
      ChannelIdList:
        type: array
        items:
          type: integer
          format: int32
        example:
          - 1
          - 2
          - 3
        description: 设备通道列表
      DestGroupId:
        type: integer
        format: int32
        example: 1
        description: 目的分组
  SetDevicePasswordBatchRsp:
    type: object
    required:
      - DeviceList
      - HSErrorCode
      - HSErrorMsg
    properties:
      DeviceList:
        type: array
        items:
          properties:
            DestNetMac:
              type: string
              example: 08:5C:1B:14:FC:BD
              description: 设备mac地址，protocol为MultiCast、MultiCast_New时返回
            DevIp:
              type: string
              example: ''
              description: 设备ip，protocol为BroadCast时返回
            Result:
              type: integer
              format: int32
              example: 0
              description: 单个设备激活错误码，成功时为0
            ResultMsg:
              type: string
              example: ''
              description: 单个设备激活错误信息
        description: 设备响应信息列表
      HSErrorCode:
        type: integer
        format: int32
        example: 0
        description: 错误码，成功时为0
      HSErrorMsg:
        type: string
        example: Operation succeed.
        description: 错误信息
  SyncOsdAndChannelNameReq:
    type: object
    required:
      - SyncMode
      - CameraCodeList
      - OsdIndex
    properties:
      SyncMode:
        type: integer
        format: int32
        description: 同步类型；0：同步通道名称到osd；1：同步osd到通道名称
      CameraCodeList:
        type: array
        items:
          type: string
        description: 相机编码列表
      OsdIndex:
        type: integer
        format: int32
        description: 需要同步的nameOsd序号，从1开始
  SyncOsdAndChannelNameRsp:
    type: object
    required:
      - HSErrorCode
      - HSErrorMsg
    properties:
      HSErrorCode:
        type: integer
        format: int32
        description: 错误码
        example: 0
      HSErrorMsg:
        type: string
        description: 错误信息
        example: Succeed
  GetSycnOsdProgressReq:
    type: object
    required:
      - CameraCodeList
    properties:
      CameraCodeList:
        type: array
        items:
          type: string
        description: 需要查询的相机列表，若传的是空则查询全部相机的同步结果
  GetSycnOsdProgressRsp:
    type: object
    required:
      - HSErrorMsg
      - SyncMode
      - HSErrorCode
      - TotalProgress
      - SyncOsdProgressList
    properties:
      HSErrorMsg:
        type: string
        description: 错误信息
        example: '0'
      SyncMode:
        type: integer
        format: int32
        description: 同步类型：0：同步通道名称到osd；1：同步osd到通道名称
        example: 1
      HSErrorCode:
        type: integer
        format: int32
        description: 错误码
        example: Succeed
      TotalProgress:
        type: integer
        format: int32
        description: 同步总进度
      SyncOsdProgressList:
        type: array
        items:
          $ref: '#/definitions/SyncOsdProgress'
        description: 同步信息详情列表
  SyncOsdProgress:
    type: object
    required:
      - CameraCode
      - ResultCode
      - Progress
    properties:
      CameraCode:
        type: string
        description: 相机编码
        example: '08721893516000010101'
      ResultCode:
        type: integer
        format: int32
        description: 错误码
        example: 0
      Progress:
        type: integer
        format: int32
        description: 同步进度
        example: 100
x-sla:
  context:
    sla: '1.0'
    type: plans
  metrics:
    connections:
      type: integer
      format: int64
      unit: 条
      description: API支持的最大连接数(并发)
    retry-times:
      type: integer
      format: int64
      unit: 次
      description: API重试次数
    get:
      type: string
      description: get
    post:
      type: string
      description: post
  plans:
    api-mall:
      rates:
        /device/mainDevice/startSearch/v1.0:
          post:
            description: 每一个用户在同一个周期类，只能启动一次
        /HSAPI/V1/DeviceMgr/DeviceSearch:
          post:
            connections:
              - max: 0
            description: 不支持多任务并行启动
        /HSAPI/V1:
          0/Devices/Spec:
            get:
              requests: []
          0/Devices/GetDevVer:
            get:
              requests: []
          0/Devices/GetUpgradeVer:
            get:
              requests: []
          0/Devices/GetUpgradeInfo:
            get:
              requests: []
          0/Devices/OnlineUpgradeDev:
            post:
              requests: []
          0/Devices/GetUpgradeStatus:
            get:
              requests: []
          0/Devices/UpgradeDevInfo:
            get:
              requests: []
          0/Devices/DevVer:
            get:
              requests: []
          0/Devices/Version:
            post:
              requests: []
          0/Devices/UpgradeInfo:
            get:
              requests: []
        /device/masterDeviceList/v1:
          - null
          - get:
              requests: []
        /device/deviceList/v1:
          - get:
              requests: []
      guarantees:
        /device/mainDevice/startSearch/v1.0:
          post:
            objectives:
              retry-times: 1
        /device/masterDeviceList/v1:
          - null
          - null
        /device/deviceList/v1:
          - null
