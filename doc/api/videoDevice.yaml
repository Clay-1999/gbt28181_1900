  /device/heatMapStatistics:
    post:
      x-api-distribute: open
      x-api-domain: System
      x-api-scope: 1800
      tags:
        - 摄像机智能参数配置
      summary: 热度图统计数据查询
      description: 热度图统计报表数据查询。仅支持HWSDK协议接入的相机。当获取空间热度图参数时，Image字段内容表示热度图空间密度分布的数据，即SDC查询出的空间热度图原始数据是352 * 288的二维数组，数组的每个元素是uchar类型的变量，0~12表示0热度（即不显示颜色，透明，推荐值Alpha=0），13~255所代表的颜色值热度标尺从左至右进行取色， Alpha通道给半透明（推荐值Alpha=160）。热度图绘制方法：1. 调用当前API获取热度图二维灰度数据，即Image字段内容，背景图则可以通过手动抓拍接口获取；2. 按上述方法将灰度值二维数组转换成像素图；3. 在给定区域绘制背景图；4. 在绘制背景图相同的区域平滑拉伸绘制步骤2所转化像素图
      operationId: heatmap_staticstics
      parameters:
        - name: req
          in: body
          schema:
            $ref: '#/definitions/heatMapStatisticsReq'
          description: 请求报文
          required: true
      responses:
        '200':
          description: 返回报文
          schema:
            $ref: '#/definitions/heatMapStatisticsRsp'
