                description: 移动侦测的时间间隔；在该时间间隔内的所有运动都视为同一个运动。取值范围为1~30，单位：秒，默认为：10
              sensitivity:
                type: integer
                format: int32
                example: 3
                description: 移动侦测的灵敏度；取值范围为1~5，1表示灵敏度最低，5表示灵敏度最高
              autoClearAlarmTime:
                type: integer
                format: int32
                example: 120
                description: 移动侦测告警检测时间间隔；取值范围为1~255，单位：秒，默认为120秒，即每隔120秒检测一次是否存在告警
              rectNum:
                type: integer
                format: int32
                example: 1
                description: 有效区域信息的个数，取值范围为0~8
              rectDetectionList:
                items:
                  properties:
                    left:
                      type: number
                      format: double
                      example: 0
                      description: 矩形窗口左上角X轴坐标，取值范围为0~图像宽度
                    top:
                      type: number
                      format: double
                      example: 0
                      description: 矩形窗口左上角Y轴坐标，取值范围为0~图像高度
                    right:
                      type: number
                      format: double
                      example: 0
                      description: 矩形窗口右下角X轴坐标，取值范围为0~图像宽度
                    bottom:
                      type: number
                      format: double
                      example: 0
                      description: 矩形窗口右下角Y轴坐标，取值范围为0~图像高度
                  required:
                    - left
                    - top
                    - right
                    - bottom
                type: array
                description: 运动检测区域列表，最大运动检测区域个数为8
            description: 移动侦测参数对象
            required:
              - motionDetectionEnable
              - platformMotionDetection
              - detectInterval
              - sensitivity
              - autoClearAlarmTime
              - rectNum
              - rectDetectionList
        description: 配置参数对象
        required:
          - motionDetection
    required:
      - deviceCode
      - configType
      - configItem
